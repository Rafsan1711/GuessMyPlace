name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'data/**'
      - '.github/workflows/sync-to-huggingface.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install huggingface_hub

      - name: Validate data files
        run: |
          python data/scripts/validate_data.py

      - name: Combine data files
        run: |
          python data/scripts/combine_data.py

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          # Configure git
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Add Hugging Face remote
          git remote add huggingface https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}.git || true
          
          # Prepare backend-only branch
          git subtree split --prefix backend -b hf-backend
          
          # Create temporary directory for HF space
          mkdir -p hf-space-temp
          cd hf-space-temp
          
          # Initialize git
          git init
          git remote add origin https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}.git
          
          # Copy backend files
          cp -r ../backend/* .
          
          # Copy data files
          mkdir -p data
          cp -r ../data/* data/
          
          # Create README for Space
          cat > README.md << 'EOF'
          ---
          title: GuessMyPlace API
          emoji: 🌍
          colorFrom: blue
          colorTo: green
          sdk: docker
          app_port: 5000
          pinned: false
          license: gpl-3.0
          ---
          
          # GuessMyPlace Backend API
          
          Intelligent Akinator-style guessing game for Countries, Cities, and Historic Places.
          
          ## API Endpoints
          
          - `GET /health` - Health check
          - `POST /api/game/start` - Start new game
          - `POST /api/game/answer` - Submit answer
          - `GET /api/game/state/:sessionId` - Get game state
          
          For full documentation, see [API Docs](https://github.com/YOUR_USERNAME/GuessMyPlace/blob/main/docs/API.md)
          
          ## Environment Variables
          
          Set these in Space Settings → Repository secrets:
          
          - `FIREBASE_DATABASE_URL`
          - `FIREBASE_API_KEY`
          - `REDIS_URL`
          - `SECRET_KEY`
          EOF
          
          # Commit changes
          git add .
          git commit -m "Sync from GitHub: ${{ github.sha }}"
          
          # Push to Hugging Face
          git push https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}.git main --force
          
          # Cleanup
          cd ..
          rm -rf hf-space-temp
          git branch -D hf-backend || true

      - name: Verify deployment
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          echo "Deployment complete!"
          echo "Space URL: https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}"
          echo "API URL: https://${HF_USERNAME}-${HF_SPACE_NAME}.hf.space"
          echo ""
          echo "Note: Space may take 5-10 minutes to build on first deployment"
          echo "Check build status at: https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}/logs"
