name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'data/**'
      - '.github/workflows/sync-to-huggingface.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install huggingface_hub

      - name: Validate data files
        run: |
          python data/scripts/validate_data.py || echo "Validation warnings (non-critical)"

      - name: Combine data files
        run: |
          python data/scripts/combine_data.py || echo "Combine data warnings (non-critical)"
      
      - name: Verify C++ source files
        run: |
          echo "Checking C++ source files..."
          ls -la backend/algorithms/cpp/
          echo "CMakeLists.txt exists:"
          cat backend/algorithms/cpp/CMakeLists.txt | head -20

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          # Configure git with credentials
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Configure git credential helper to use token
          git config --global credential.helper store
          echo "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co" > ~/.git-credentials
          
          # Create temporary directory for HF space
          mkdir -p hf-space-temp
          cd hf-space-temp
          
          # Initialize git
          git init
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          
          # Copy backend files
          echo "Copying backend files..."
          cp -r ../backend/* .
          
          # Copy data files
          echo "Copying data files..."
          mkdir -p data
          cp -r ../data/* data/
          
          # Ensure C++ build directory exists
          mkdir -p algorithms/cpp/build
          touch algorithms/cpp/build/.gitkeep
          
          # Verify critical files exist
          echo "Verifying files..."
          ls -la algorithms/cpp/
          test -f algorithms/cpp/CMakeLists.txt || (echo "ERROR: CMakeLists.txt missing!" && exit 1)
          test -f Dockerfile || (echo "ERROR: Dockerfile missing!" && exit 1)
          test -f requirements.txt || (echo "ERROR: requirements.txt missing!" && exit 1)
          
          # Create README for Space
          cat > README.md << 'EOF'
          ---
          title: GuessMyPlace API
          emoji: 🌍
          colorFrom: blue
          colorTo: green
          sdk: docker
          app_port: 5000
          pinned: false
          license: gpl-3.0
          ---
          
          # GuessMyPlace Backend API
          
          Intelligent Akinator-style guessing game for Countries, Cities, and Historic Places.
          
          ## Features
          
          - 🧠 C++ powered decision tree algorithm
          - 🎯 High-performance question selection
          - 🌐 Multi-language support (EN, BN)
          - 📊 Real-time statistics
          
          ## API Endpoints
          
          - `GET /health` - Health check
          - `POST /api/game/start` - Start new game
          - `POST /api/game/answer` - Submit answer
          - `GET /api/game/state/:sessionId` - Get game state
          - `POST /api/game/guess` - Validate guess
          
          ## Environment Variables
          
          Set these in Space Settings → Repository secrets:
          
          - `FIREBASE_DATABASE_URL` - Firebase Realtime Database URL
          - `REDIS_URL` - Redis connection URL (optional)
          - `SECRET_KEY` - Flask secret key
          
          ## Technical Stack
          
          - **Backend**: Python 3.10 + Flask
          - **Algorithms**: C++ (compiled during build)
          - **Database**: Firebase Realtime Database
          - **Cache**: Redis (optional)
          
          ## Build Process
          
          The Dockerfile automatically:
          1. Compiles C++ modules with CMake
          2. Installs Python dependencies
          3. Sets up the Flask application
          
          ## Documentation
          
          For full documentation, see the [main repository](https://github.com/YOUR_USERNAME/GuessMyPlace).
          EOF
          
          # Commit changes
          git add .
          git commit -m "Sync from GitHub: $(date +%Y-%m-%d-%H-%M-%S)" || echo "No changes to commit"
          
          # Add remote and push
          git remote add space https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}.git
          git branch -M main
          
          echo "Pushing to Hugging Face Space..."
          git push -u space main --force
          
          # Cleanup
          cd ..
          rm -rf hf-space-temp
          rm -f ~/.git-credentials

      - name: Verify deployment
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          echo "✅ Deployment complete!"
          echo ""
          echo "📍 Space URL: https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}"
          echo "🔗 API URL: https://${HF_USERNAME}-${HF_SPACE_NAME}.hf.space"
          echo ""
          echo "⏳ Build Status: Check logs at https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}/logs"
          echo ""
          echo "ℹ️  Note: First build may take 5-10 minutes (C++ compilation)"
          echo ""
